name: perfect_flutter_example
description: Example app demonstrating perfect_flutter as a dev_dependency. No imports, no widget wrapping — only the pubspec entry is needed.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # The package under development. In a real consumer this would be:
  #   perfect_flutter: ^0.1.0
  perfect_flutter:
    path: ../

flutter:
  uses-material-design: true
